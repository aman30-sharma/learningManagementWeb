<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduMatrix</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .alert-success {
            background-color: #D1FAE5;
            color: #065F46;
        }
        .alert-error {
            background-color: #FEE2E2;
            color: #991B1B;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card card">
            <h1 style="text-align: center; margin-bottom: 24px;">🎓 EduMatrix</h1>
            <h2 style="text-align: center; margin-bottom: 32px;">Login</h2>
            
            <div th:if="${param.registered}" class="alert alert-success">
                Registration successful! Please login.
            </div>
            <div th:if="${param.error}" class="alert alert-error">
                Invalid username or password.
            </div>
            
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px;">
                Don't have an account? <a th:href="@{/register}" style="color: var(--primary-color);">Register</a>
            </p>
        </div>
    </div>
    <script th:src="@{/js/theme-toggle.js}"></script>
</body>
</html>
